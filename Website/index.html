<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnlockThePlock - Pop the Lock for Pebble</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-color: #ffde00; 
            --btn-bg: #1a1a1a;
            --btn-hover: #2a2a2a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin-top: 4rem;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 0.3rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-weight: 900;
        }

        p.tagline {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 3rem;
        }

        .banner-container {
            display: flex;
            flex-direction: column;
            gap: 3rem;
            width: 90%;
            max-width: 1200px;
            margin-bottom: 4rem;
            align-items: center;
        }

        .banner-item {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid #222;
        }

        .banner-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        .cta-container {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 5rem;
        }

        .btn {
            display: inline-block;
            padding: 1.2rem 3rem;
            font-size: 1.2rem;
            font-weight: 800;
            text-decoration: none;
            color: var(--text-color);
            background-color: var(--btn-bg);
            border: 2px solid #333;
            border-radius: 8px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            min-width: 120px;
            text-align: center;
        }

        .btn:hover {
            background-color: var(--btn-hover);
            border-color: var(--accent-color);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 222, 0, 0.2);
        }

        .btn-primary {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        footer {
            margin-top: auto;
            margin-bottom: 3rem;
            color: #333;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .btn { padding: 1rem 2rem; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>UnlockThePlock</h1>
        <p class="tagline">Pop the Lock for your Pebble smartwatch.</p>
    </header>

    <div class="cta-container">
        <a href="UnlockThePlock.pbw" class="btn btn-primary" download>Get</a>
        <a href="https://github.com/HenryTheAddict/unlocktheplock" class="btn" target="_blank">Git</a>
    </div>

    <div class="banner-container">
        <div class="banner-item">
            <img src="utpe.png" alt="Emery Banner">
        </div>
        <div class="banner-item">
            <img src="utpbw.png" alt="B&W Banner">
        </div>
    </div>

    <footer>
        &copy; 2026 HenryTheAddict
    </footer>

</body>
</html>
