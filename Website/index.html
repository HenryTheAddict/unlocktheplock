<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnlockThePlock - Pop the Lock for Pebble</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-color: #ffde00; /* Yellow like the game's highlight */
            --btn-bg: #222222;
            --btn-hover: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin-top: 4rem;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 0.2rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        p.tagline {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 3rem;
        }

        .screenshot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 2rem;
            max-width: 1000px;
            width: 90%;
            margin-bottom: 4rem;
            justify-items: center;
        }

        .screenshot-item {
            background: #111;
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .screenshot-item:hover {
            transform: scale(1.05);
        }

        .screenshot-item img {
            display: block;
            border-radius: 10px;
            width: 180px; /* Standard Pebble Round width */
            height: auto;
        }

        .cta-container {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 5rem;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
            color: var(--text-color);
            background-color: var(--btn-bg);
            border: 2px solid transparent;
            border-radius: 50px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        .btn:hover {
            background-color: var(--btn-hover);
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: #000;
        }

        .btn-primary:hover {
            background-color: #fff;
            color: #000;
        }

        footer {
            margin-bottom: 2rem;
            color: #444;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .screenshot-grid { grid-template-columns: repeat(2, 1fr); }
            .btn { padding: 0.8rem 1.5rem; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>UnlockThePlock</h1>
        <p class="tagline">Pop the Lock for your Pebble smartwatch.</p>
    </header>

    <div class="cta-container">
        <a href="UnlockThePlock.pbw" class="btn btn-primary" download>Get PBW</a>
        <a href="https://github.com/HenryTheAddict/unlocktheplock" class="btn" target="_blank">Git Repository</a>
    </div>

    <div class="screenshot-grid">
        <div class="screenshot-item">
            <img src="screenshots/pebble_screenshot_2026-04-19_03-55-02.png" alt="Gameplay 1">
        </div>
        <div class="screenshot-item">
            <img src="screenshots/pebble_screenshot_2026-04-19_03-55-09.png" alt="Gameplay 2">
        </div>
        <div class="screenshot-item">
            <img src="screenshots/pebble_screenshot_2026-04-19_03-55-21.png" alt="Gameplay 3">
        </div>
        <div class="screenshot-item">
            <img src="screenshots/pebble_screenshot_2026-04-19_03-55-29.png" alt="Gameplay 4">
        </div>
        <div class="screenshot-item">
            <img src="screenshots/pebble_screenshot_2026-04-19_03-55-42.png" alt="Gameplay 5">
        </div>
        <div class="screenshot-item">
            <img src="screenshots/pebble_screenshot_2026-04-19_03-55-53.png" alt="Gameplay 6">
        </div>
        <div class="screenshot-item">
            <img src="screenshots/screenshot_flint.png" alt="Flint View">
        </div>
        <div class="screenshot-item">
            <img src="screenshots/screenshot_gabbro.png" alt="Gabbro View">
        </div>
    </div>

    <footer>
        &copy; 2026 HenryTheAddict. Built for Pebble.
    </footer>

</body>
</html>
